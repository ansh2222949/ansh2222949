name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ansh2222949
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#e8375a&color_dots=#161b22,#1a0510,#3d0f1e,#6b1530,#e8375a
            dist/snake.gif?palette=github-dark&color_snake=#e8375a&color_dots=#161b22,#1a0510,#3d0f1e,#6b1530,#e8375a

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
