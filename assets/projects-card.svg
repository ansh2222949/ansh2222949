<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <defs>
    <style>
      @keyframes glow1 { 0%,100%{opacity:0.4} 50%{opacity:1} }
      @keyframes slideUp1 { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }
      @keyframes slideUp2 { 0%,20%{opacity:0;transform:translateY(10px)} 30%,100%{opacity:1;transform:translateY(0)} }
      @keyframes slideUp3 { 0%,40%{opacity:0;transform:translateY(10px)} 50%,100%{opacity:1;transform:translateY(0)} }
      @keyframes slideUp4 { 0%,60%{opacity:0;transform:translateY(10px)} 70%,100%{opacity:1;transform:translateY(0)} }
      .c1 { animation: slideUp1 2s ease-out forwards; }
      .c2 { animation: slideUp2 2s ease-out forwards; }
      .c3 { animation: slideUp3 2s ease-out forwards; }
      .c4 { animation: slideUp4 2s ease-out forwards; }
      .glow { animation: glow1 3s ease-in-out infinite; }
    </style>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8375a"/>
      <stop offset="100%" stop-color="#a8203a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="320" rx="14" fill="#0d1117"/>
  
  <!-- ═══ Card 1: NeonAI ═══ -->
  <g class="c1">
    <rect x="15" y="15" width="275" height="130" rx="10" fill="#161b22" stroke="#1e2530" stroke-width="1"/>
    <!-- Accent line -->
    <rect x="15" y="15" width="4" height="130" rx="2" fill="url(#accent)" class="glow"/>
    <!-- Icon -->
    <text x="35" y="44" fill="#e8375a" font-family="monospace" font-size="16">⚡</text>
    <!-- Title -->
    <text x="55" y="44" fill="#c9d1d9" font-family="monospace" font-size="14" font-weight="bold">NeonAI</text>
    <!-- Stars badge -->
    <rect x="230" y="28" width="48" height="18" rx="9" fill="#0d1117" stroke="#1e2530" stroke-width="0.8"/>
    <text x="254" y="41" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="9">★ 10</text>
    <!-- Description -->
    <text x="35" y="66" fill="#6b7280" font-family="monospace" font-size="10">Local AI · semantic routing</text>
    <text x="35" y="80" fill="#6b7280" font-family="monospace" font-size="10">5 modes · voice · zero cloud</text>
    <!-- Tech tags -->
    <rect x="35" y="96" width="55" height="18" rx="4" fill="#0d1117"/>
    <text x="62" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Whisper</text>
    <rect x="96" y="96" width="50" height="18" rx="4" fill="#0d1117"/>
    <text x="121" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Ollama</text>
    <rect x="152" y="96" width="42" height="18" rx="4" fill="#0d1117"/>
    <text x="173" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Flask</text>
    <rect x="200" y="96" width="50" height="18" rx="4" fill="#0d1117"/>
    <text x="225" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">SoVITS</text>
    <!-- Status -->
    <circle cx="38" cy="130" r="3" fill="#22c55e"/>
    <text x="48" y="134" fill="#4b5563" font-family="monospace" font-size="8">active</text>
  </g>

  <!-- ═══ Card 2: AI Mouse ═══ -->
  <g class="c2">
    <rect x="310" y="15" width="275" height="130" rx="10" fill="#161b22" stroke="#1e2530" stroke-width="1"/>
    <rect x="310" y="15" width="4" height="130" rx="2" fill="url(#accent)" class="glow"/>
    <text x="330" y="44" fill="#e8375a" font-family="monospace" font-size="16">🖱️</text>
    <text x="355" y="44" fill="#c9d1d9" font-family="monospace" font-size="14" font-weight="bold">AI Mouse</text>
    <text x="330" y="66" fill="#6b7280" font-family="monospace" font-size="10">Hand gesture mouse control</text>
    <text x="330" y="80" fill="#6b7280" font-family="monospace" font-size="10">real-time CV · hybrid ML</text>
    <rect x="330" y="96" width="55" height="18" rx="4" fill="#0d1117"/>
    <text x="357" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">OpenCV</text>
    <rect x="391" y="96" width="66" height="18" rx="4" fill="#0d1117"/>
    <text x="424" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">MediaPipe</text>
    <rect x="463" y="96" width="50" height="18" rx="4" fill="#0d1117"/>
    <text x="488" y="109" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Python</text>
    <circle cx="333" cy="130" r="3" fill="#22c55e"/>
    <text x="343" y="134" fill="#4b5563" font-family="monospace" font-size="8">active</text>
  </g>

  <!-- ═══ Card 3: NeonPlayer ═══ -->
  <g class="c3">
    <rect x="15" y="165" width="275" height="130" rx="10" fill="#161b22" stroke="#1e2530" stroke-width="1"/>
    <rect x="15" y="165" width="4" height="130" rx="2" fill="url(#accent)" class="glow"/>
    <text x="35" y="194" fill="#e8375a" font-family="monospace" font-size="16">🎵</text>
    <text x="55" y="194" fill="#c9d1d9" font-family="monospace" font-size="14" font-weight="bold">NeonPlayer</text>
    <text x="35" y="216" fill="#6b7280" font-family="monospace" font-size="10">Offline desktop media player</text>
    <text x="35" y="230" fill="#6b7280" font-family="monospace" font-size="10">no internet · pure local</text>
    <rect x="35" y="246" width="66" height="18" rx="4" fill="#0d1117"/>
    <text x="68" y="259" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">PyWebView</text>
    <rect x="107" y="246" width="50" height="18" rx="4" fill="#0d1117"/>
    <text x="132" y="259" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Offline</text>
    <rect x="163" y="246" width="50" height="18" rx="4" fill="#0d1117"/>
    <text x="188" y="259" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Python</text>
    <circle cx="38" cy="280" r="3" fill="#f59e0b"/>
    <text x="48" y="284" fill="#4b5563" font-family="monospace" font-size="8">wip</text>
  </g>

  <!-- ═══ Card 4: Monument AI ═══ -->
  <g class="c4">
    <rect x="310" y="165" width="275" height="130" rx="10" fill="#161b22" stroke="#1e2530" stroke-width="1"/>
    <rect x="310" y="165" width="4" height="130" rx="2" fill="url(#accent)" class="glow"/>
    <text x="330" y="194" fill="#e8375a" font-family="monospace" font-size="16">🏛️</text>
    <text x="355" y="194" fill="#c9d1d9" font-family="monospace" font-size="14" font-weight="bold">Monument AI</text>
    <text x="330" y="216" fill="#6b7280" font-family="monospace" font-size="10">CNN monument recognition</text>
    <text x="330" y="230" fill="#6b7280" font-family="monospace" font-size="10">deep learning from scratch</text>
    <rect x="330" y="246" width="72" height="18" rx="4" fill="#0d1117"/>
    <text x="366" y="259" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">TensorFlow</text>
    <rect x="408" y="246" width="38" height="18" rx="4" fill="#0d1117"/>
    <text x="427" y="259" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">CNN</text>
    <rect x="452" y="246" width="45" height="18" rx="4" fill="#0d1117"/>
    <text x="474" y="259" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">Keras</text>
    <circle cx="333" cy="280" r="3" fill="#22c55e"/>
    <text x="343" y="284" fill="#4b5563" font-family="monospace" font-size="8">done</text>
  </g>
</svg>
