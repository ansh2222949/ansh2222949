<svg width="480" height="360" viewBox="0 0 480 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="30" x2="440" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111f"/>
      <stop offset="0.52" stop-color="#17030f"/>
      <stop offset="1" stop-color="#07151b"/>
    </linearGradient>
    <linearGradient id="cyanPink" x1="148" y1="109" x2="325" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FFC8"/>
      <stop offset="1" stop-color="#FF4D7E"/>
    </linearGradient>
    <linearGradient id="wingFill" x1="122" y1="128" x2="370" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00FFC8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FF4D7E" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 178) rotate(90) scale(120 120)">
      <stop stop-color="#FF4D7E" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FF4D7E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#6EE7F5" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="10" y="10" width="460" height="340" rx="28" fill="url(#bg)"/>
  <rect x="10" y="10" width="460" height="340" rx="28" fill="url(#grid)"/>
  <rect x="22" y="22" width="436" height="316" rx="22" stroke="url(#cyanPink)" stroke-opacity="0.5"/>
  <circle cx="240" cy="178" r="120" fill="url(#orb)"/>

  <g filter="url(#softGlow)">
