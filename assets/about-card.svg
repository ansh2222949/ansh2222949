<svg xmlns="http://www.w3.org/2000/svg" width="550" height="280" viewBox="0 0 550 280">
  <defs>
    <!-- Blinking cursor -->
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes scanline { 0%{transform:translateY(-100%)} 100%{transform:translateY(280px)} }
      @keyframes fadeIn1 { 0%,15%{opacity:0} 20%,100%{opacity:1} }
      @keyframes fadeIn2 { 0%,25%{opacity:0} 30%,100%{opacity:1} }
      @keyframes fadeIn3 { 0%,35%{opacity:0} 40%,100%{opacity:1} }
      @keyframes fadeIn4 { 0%,45%{opacity:0} 50%,100%{opacity:1} }
      @keyframes fadeIn5 { 0%,55%{opacity:0} 60%,100%{opacity:1} }
      @keyframes fadeIn6 { 0%,65%{opacity:0} 70%,100%{opacity:1} }
      @keyframes fadeIn7 { 0%,75%{opacity:0} 80%,100%{opacity:1} }
      @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
      .cursor { animation: blink 1s infinite; }
      .scan { animation: scanline 4s linear infinite; opacity: 0.03; }
      .l1 { animation: fadeIn1 3s ease forwards; }
      .l2 { animation: fadeIn2 3s ease forwards; }
      .l3 { animation: fadeIn3 3s ease forwards; }
      .l4 { animation: fadeIn4 3s ease forwards; }
      .l5 { animation: fadeIn5 3s ease forwards; }
      .l6 { animation: fadeIn6 3s ease forwards; }
      .l7 { animation: fadeIn7 3s ease forwards; }
      .dot { animation: pulse 2s ease infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="550" height="280" rx="12" fill="#0d1117"/>
  
  <!-- Title bar -->
  <rect x="0" y="0" width="550" height="36" rx="12" fill="#161b22"/>
  <rect x="0" y="12" width="550" height="24" fill="#161b22"/>
  
  <!-- Window dots -->
  <circle cx="20" cy="18" r="5.5" fill="#e8375a" class="dot"/>
  <circle cx="38" cy="18" r="5.5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="56" cy="18" r="5.5" fill="#22c55e" opacity="0.7"/>
  
  <!-- Title text -->
  <text x="275" y="22" text-anchor="middle" fill="#4b5563" font-family="'JetBrains Mono',monospace" font-size="11">about.js — 𝕬𝖓𝖘𝖍 ♤</text>
  
  <!-- Scanline effect -->
  <rect class="scan" x="0" y="0" width="550" height="4" fill="#e8375a"/>
  
  <!-- Line numbers -->
  <text x="18" y="62" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">1</text>
  <text x="18" y="84" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">2</text>
  <text x="18" y="106" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">3</text>
  <text x="18" y="128" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">4</text>
  <text x="18" y="150" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">5</text>
  <text x="18" y="172" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">6</text>
  <text x="18" y="194" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">7</text>
  <text x="18" y="216" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">8</text>
  <text x="18" y="238" fill="#2d333b" font-family="'JetBrains Mono',monospace" font-size="11">9</text>
  
  <!-- Line separator -->
  <line x1="35" y1="44" x2="35" y2="260" stroke="#1a1a2e" stroke-width="1"/>
  
  <!-- Code lines with fade-in animation -->
  <!-- Line 1: const -->
  <g class="l1">
    <text x="45" y="62" fill="#c678dd" font-family="'JetBrains Mono',monospace" font-size="12">const</text>
    <text x="93" y="62" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">ansh</text>
    <text x="133" y="62" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">=</text>
    <text x="148" y="62" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">{</text>
  </g>
  
  <!-- Line 2: name -->
  <g class="l2">
    <text x="65" y="84" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">name:</text>
    <text x="150" y="84" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"Ansh"</text>
    <text x="208" y="84" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
  </g>
  
  <!-- Line 3: title -->
  <g class="l3">
    <text x="65" y="106" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">title:</text>
    <text x="150" y="106" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"AI Systems Architect"</text>
    <text x="390" y="106" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
  </g>
  
  <!-- Line 4: location -->
  <g class="l4">
    <text x="65" y="128" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">location:</text>
    <text x="150" y="128" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"localhost:5000"</text>
    <text x="325" y="128" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
  </g>
  
  <!-- Line 5: focus -->
  <g class="l5">
    <text x="65" y="150" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">focus:</text>
    <text x="150" y="150" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">[</text>
    <text x="163" y="150" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"AI"</text>
    <text x="195" y="150" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
    <text x="208" y="150" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"Voice"</text>
    <text x="266" y="150" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
    <text x="279" y="150" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"Vision"</text>
    <text x="348" y="150" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
    <text x="361" y="150" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"ML"</text>
    <text x="393" y="150" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">],</text>
  </g>
  
  <!-- Line 6: stack -->
  <g class="l6">
    <text x="65" y="172" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">stack:</text>
    <text x="150" y="172" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"Whisper + Ollama + Flask"</text>
    <text x="430" y="172" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">,</text>
  </g>
  
  <!-- Line 7: philosophy -->
  <g class="l7">
    <text x="65" y="194" fill="#e06c75" font-family="'JetBrains Mono',monospace" font-size="12">rule:</text>
    <text x="150" y="194" fill="#98c379" font-family="'JetBrains Mono',monospace" font-size="12">"System > Model. Always."</text>
  </g>
  
  <!-- Line 8: closing -->
  <g class="l7">
    <text x="45" y="216" fill="#c9d1d9" font-family="'JetBrains Mono',monospace" font-size="12">};</text>
  </g>
  
  <!-- Line 9: comment + cursor -->
  <g class="l7">
    <text x="45" y="238" fill="#5c6370" font-family="'JetBrains Mono',monospace" font-size="12">// offline-first. zero cloud.</text>
    <rect class="cursor" x="290" y="226" width="8" height="15" fill="#e8375a" rx="1"/>
  </g>
  
  <!-- Subtle glow on bottom -->
  <rect x="0" y="268" width="550" height="12" rx="0" fill="url(#glow)"/>
  <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0d1117"/>
    <stop offset="50%" stop-color="#e8375a" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </linearGradient>
  
  <!-- Bottom border -->
  <rect x="0" y="270" width="550" height="10" rx="0" fill="#0d1117"/>
  <rect x="0" y="270" width="550" height="10" rx="6" fill="#0d1117"/>
</svg>
