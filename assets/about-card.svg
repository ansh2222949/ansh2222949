<svg xmlns="http://www.w3.org/2000/svg" width="550" height="260" viewBox="0 0 550 260">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes scanline { 0%{transform:translateY(-10px)} 100%{transform:translateY(260px)} }
      @keyframes fadeIn1 { 0%,10%{opacity:0} 16%,100%{opacity:1} }
      @keyframes fadeIn2 { 0%,18%{opacity:0} 24%,100%{opacity:1} }
      @keyframes fadeIn3 { 0%,26%{opacity:0} 32%,100%{opacity:1} }
      @keyframes fadeIn4 { 0%,34%{opacity:0} 40%,100%{opacity:1} }
      @keyframes fadeIn5 { 0%,42%{opacity:0} 48%,100%{opacity:1} }
      @keyframes fadeIn6 { 0%,50%{opacity:0} 56%,100%{opacity:1} }
      @keyframes fadeIn7 { 0%,58%{opacity:0} 64%,100%{opacity:1} }
      @keyframes fadeIn8 { 0%,66%{opacity:0} 72%,100%{opacity:1} }
      @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
      .cursor { animation: blink 1s step-end infinite; }
      .scan { animation: scanline 3s linear infinite; opacity: 0.04; }
      .l1 { animation: fadeIn1 2.5s ease-out forwards; }
      .l2 { animation: fadeIn2 2.5s ease-out forwards; }
      .l3 { animation: fadeIn3 2.5s ease-out forwards; }
      .l4 { animation: fadeIn4 2.5s ease-out forwards; }
      .l5 { animation: fadeIn5 2.5s ease-out forwards; }
      .l6 { animation: fadeIn6 2.5s ease-out forwards; }
      .l7 { animation: fadeIn7 2.5s ease-out forwards; }
      .l8 { animation: fadeIn8 2.5s ease-out forwards; }
      .dot1 { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="550" height="260" rx="10" fill="#0d1117"/>
  
  <!-- Title bar -->
  <rect width="550" height="34" rx="10" fill="#161b22"/>
  <rect y="20" width="550" height="14" fill="#161b22"/>
  
  <!-- Window dots -->
  <circle cx="18" cy="17" r="5" fill="#e8375a" class="dot1"/>
  <circle cx="34" cy="17" r="5" fill="#f59e0b" opacity="0.6"/>
  <circle cx="50" cy="17" r="5" fill="#22c55e" opacity="0.6"/>
  <text x="275" y="21" text-anchor="middle" fill="#4b5563" font-family="monospace" font-size="11">about.js</text>
  
  <!-- Scan line -->
  <rect class="scan" x="0" y="0" width="550" height="3" fill="#e8375a" rx="1"/>
  
  <!-- Line numbers gutter -->
  <line x1="32" y1="34" x2="32" y2="260" stroke="#161b22" stroke-width="1"/>
  <text x="20" y="56" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">1</text>
  <text x="20" y="80" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">2</text>
  <text x="20" y="104" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">3</text>
  <text x="20" y="128" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">4</text>
  <text x="20" y="152" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">5</text>
  <text x="20" y="176" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">6</text>
  <text x="20" y="200" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">7</text>
  <text x="20" y="224" text-anchor="middle" fill="#2d333b" font-family="monospace" font-size="10">8</text>

  <!-- Line 1 -->
  <g class="l1">
    <text x="42" y="56" fill="#c678dd" font-family="monospace" font-size="12.5" font-weight="bold">const </text>
    <text x="90" y="56" fill="#e06c75" font-family="monospace" font-size="12.5">ansh </text>
    <text x="132" y="56" fill="#56b6c2" font-family="monospace" font-size="12.5">= </text>
    <text x="150" y="56" fill="#c9d1d9" font-family="monospace" font-size="12.5">{</text>
  </g>
  <!-- Line 2 -->
  <g class="l2">
    <text x="62" y="80" fill="#e06c75" font-family="monospace" font-size="12.5">name</text>
    <text x="100" y="80" fill="#c9d1d9" font-family="monospace" font-size="12.5">: </text>
    <text x="116" y="80" fill="#98c379" font-family="monospace" font-size="12.5">"Ansh"</text>
    <text x="168" y="80" fill="#c9d1d9" font-family="monospace" font-size="12.5">,</text>
  </g>
  <!-- Line 3 -->
  <g class="l3">
    <text x="62" y="104" fill="#e06c75" font-family="monospace" font-size="12.5">title</text>
    <text x="108" y="104" fill="#c9d1d9" font-family="monospace" font-size="12.5">: </text>
    <text x="124" y="104" fill="#98c379" font-family="monospace" font-size="12.5">"AI Systems Architect"</text>
    <text x="340" y="104" fill="#c9d1d9" font-family="monospace" font-size="12.5">,</text>
  </g>
  <!-- Line 4 -->
  <g class="l4">
    <text x="62" y="128" fill="#e06c75" font-family="monospace" font-size="12.5">location</text>
    <text x="130" y="128" fill="#c9d1d9" font-family="monospace" font-size="12.5">: </text>
    <text x="146" y="128" fill="#98c379" font-family="monospace" font-size="12.5">"localhost:5000"</text>
    <text x="288" y="128" fill="#c9d1d9" font-family="monospace" font-size="12.5">,</text>
  </g>
  <!-- Line 5 -->
  <g class="l5">
    <text x="62" y="152" fill="#e06c75" font-family="monospace" font-size="12.5">focus</text>
    <text x="108" y="152" fill="#c9d1d9" font-family="monospace" font-size="12.5">: [</text>
    <text x="132" y="152" fill="#98c379" font-family="monospace" font-size="12.5">"AI"</text>
    <text x="164" y="152" fill="#c9d1d9" font-family="monospace" font-size="12.5">, </text>
    <text x="180" y="152" fill="#98c379" font-family="monospace" font-size="12.5">"Voice"</text>
    <text x="230" y="152" fill="#c9d1d9" font-family="monospace" font-size="12.5">, </text>
    <text x="246" y="152" fill="#98c379" font-family="monospace" font-size="12.5">"Vision"</text>
    <text x="304" y="152" fill="#c9d1d9" font-family="monospace" font-size="12.5">, </text>
    <text x="320" y="152" fill="#98c379" font-family="monospace" font-size="12.5">"ML"</text>
    <text x="352" y="152" fill="#c9d1d9" font-family="monospace" font-size="12.5">],</text>
  </g>
  <!-- Line 6 -->
  <g class="l6">
    <text x="62" y="176" fill="#e06c75" font-family="monospace" font-size="12.5">stack</text>
    <text x="108" y="176" fill="#c9d1d9" font-family="monospace" font-size="12.5">: </text>
    <text x="124" y="176" fill="#98c379" font-family="monospace" font-size="12.5">"Whisper + Ollama + Flask"</text>
    <text x="364" y="176" fill="#c9d1d9" font-family="monospace" font-size="12.5">,</text>
  </g>
  <!-- Line 7 -->
  <g class="l7">
    <text x="62" y="200" fill="#e06c75" font-family="monospace" font-size="12.5">rule</text>
    <text x="100" y="200" fill="#c9d1d9" font-family="monospace" font-size="12.5">: </text>
    <text x="116" y="200" fill="#98c379" font-family="monospace" font-size="12.5">"System &gt; Model. Always."</text>
  </g>
  <!-- Line 8 -->
  <g class="l7">
    <text x="42" y="224" fill="#c9d1d9" font-family="monospace" font-size="12.5">};</text>
    <text x="66" y="224" fill="#5c6370" font-family="monospace" font-size="11">// offline-first · zero cloud</text>
    <rect class="cursor" x="335" y="213" width="7" height="14" fill="#e8375a" rx="1"/>
  </g>
</svg>
