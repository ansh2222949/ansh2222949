<svg xmlns="http://www.w3.org/2000/svg" width="600" height="420" viewBox="0 0 600 420">
  <!-- Background -->
  <rect width="600" height="420" rx="14" fill="#0d1117" stroke="#161b22" stroke-width="1.5"/>
  
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="13" font-weight="600">NeonAI  •  Request Flow</text>
  <line x1="40" y1="38" x2="560" y2="38" stroke="#161b22" stroke-width="1"/>

  <!-- USER INPUT node -->
  <rect x="235" y="52" width="130" height="30" rx="15" fill="#161b22" stroke="#e8375a" stroke-width="1.5"/>
  <text x="300" y="72" text-anchor="middle" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="600">User Input</text>

  <!-- Split: Text / Audio -->
  <line x1="265" y1="82" x2="165" y2="112" stroke="#4b5563" stroke-width="1"/>
  <line x1="335" y1="82" x2="435" y2="112" stroke="#4b5563" stroke-width="1"/>

  <!-- /chat -->
  <rect x="110" y="112" width="110" height="26" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="165" y="129" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="10">Text → /chat</text>

  <!-- /voice -->
  <rect x="380" y="112" width="110" height="26" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="435" y="129" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="10">Audio → /voice</text>

  <!-- Whisper STT -->
  <line x1="435" y1="138" x2="435" y2="152" stroke="#4b5563" stroke-width="1"/>
  <rect x="380" y="152" width="110" height="26" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="435" y="169" text-anchor="middle" fill="#c9d1d9" font-family="monospace" font-size="10">Whisper STT</text>

  <!-- Command Router -->
  <line x1="435" y1="178" x2="435" y2="192" stroke="#4b5563" stroke-width="1"/>
  <rect x="370" y="192" width="130" height="26" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="435" y="209" text-anchor="middle" fill="#c9d1d9" font-family="monospace" font-size="10">Command Router</text>

  <!-- System CMD branch from command router -->
  <line x1="500" y1="205" x2="545" y2="205" stroke="#e8375a" stroke-width="1"/>
  <rect x="510" y="230" width="80" height="40" rx="6" fill="#161b22" stroke="#e8375a" stroke-width="1"/>
  <text x="550" y="248" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9">🔊 OS</text>
  <text x="550" y="261" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="8">Execute</text>
  <line x1="545" y1="218" x2="545" y2="230" stroke="#e8375a" stroke-width="1"/>
  <text x="535" y="225" fill="#4b5563" font-family="monospace" font-size="7">sys cmd</text>

  <!-- Arrow from command router to intent router -->
  <line x1="435" y1="218" x2="300" y2="250" stroke="#e8375a" stroke-width="1"/>
  <text x="380" y="242" fill="#4b5563" font-family="monospace" font-size="7">not cmd</text>

  <!-- Arrow from /chat to intent router -->
  <line x1="165" y1="138" x2="300" y2="250" stroke="#e8375a" stroke-width="1"/>

  <!-- INTENT SCORE ROUTER — main diamond -->
  <polygon points="300,248 345,272 300,296 255,272" fill="#161b22" stroke="#e8375a" stroke-width="2"/>
  <text x="300" y="270" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="8" font-weight="600">INTENT</text>
  <text x="300" y="280" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="8" font-weight="600">ROUTER</text>

  <!-- 4 branches from router -->

  <!-- Branch 1: Tool -->
  <line x1="255" y1="272" x2="85" y2="345" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="30" y="330" width="110" height="40" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="85" y="348" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="10">⚡ Tool</text>
  <text x="85" y="362" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="8">Deterministic</text>
  <text x="50" y="325" fill="#4b5563" font-family="monospace" font-size="7">tool</text>

  <!-- Branch 2: Web -->
  <line x1="278" y1="296" x2="215" y2="345" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="160" y="330" width="110" height="40" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="215" y="348" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="10">🌐 Web</text>
  <text x="215" y="362" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="8">Search + LLM</text>
  <text x="175" y="325" fill="#4b5563" font-family="monospace" font-size="7">web</text>

  <!-- Branch 3: LLM (main highlighted) -->
  <line x1="322" y1="296" x2="385" y2="330" stroke="#e8375a" stroke-width="1.5"/>
  <rect x="330" y="330" width="110" height="40" rx="6" fill="#161b22" stroke="#e8375a" stroke-width="1.5"/>
  <text x="385" y="348" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="10">🧠 LLM</text>
  <text x="385" y="362" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="8">Waterfall</text>
  <text x="345" y="325" fill="#e8375a" font-family="monospace" font-size="7" font-weight="600">llm</text>

  <!-- Branch 4: Clarify -->
  <line x1="345" y1="272" x2="530" y2="345" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="475" y="330" width="110" height="40" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="530" y="348" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="10">❓ Clarify</text>
  <text x="530" y="362" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="8">User Choice</text>
  <text x="495" y="325" fill="#4b5563" font-family="monospace" font-size="7">close</text>

  <!-- Confidence Gate indicator on LLM -->
  <rect x="355" y="375" width="60" height="16" rx="4" fill="#0d1117" stroke="#e8375a" stroke-width="0.8"/>
  <text x="385" y="386" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="7">CONF GATE</text>

  <!-- Response bar at bottom -->
  <line x1="40" y1="400" x2="560" y2="400" stroke="#161b22" stroke-width="1"/>
  <text x="300" y="414" text-anchor="middle" fill="#4b5563" font-family="monospace" font-size="9">──── Frontend / Voice Response ────</text>
</svg>
