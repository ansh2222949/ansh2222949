<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <!-- Background -->
  <rect width="440" height="280" rx="12" fill="#0d1117" stroke="#161b22" stroke-width="1.5"/>

  <!-- Input node -->
  <rect x="20" y="120" width="70" height="30" rx="6" fill="#161b22" stroke="#e8375a" stroke-width="1"/>
  <text x="55" y="139" text-anchor="middle" fill="#c9d1d9" font-family="monospace" font-size="11" font-weight="600">Input</text>

  <!-- Arrow to Route -->
  <line x1="90" y1="135" x2="115" y2="135" stroke="#e8375a" stroke-width="1.5"/>
  <polygon points="115,131 122,135 115,139" fill="#e8375a"/>

  <!-- Route diamond -->
  <polygon points="150,115 178,135 150,155 122,135" fill="#161b22" stroke="#e8375a" stroke-width="1"/>
  <text x="150" y="139" text-anchor="middle" fill="#e8375a" font-family="monospace" font-size="9" font-weight="600">Route</text>

  <!-- Branch: Tool (top) -->
  <line x1="178" y1="135" x2="195" y2="40" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="200" y="25" width="100" height="28" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="218" y="43" fill="#e8375a" font-family="monospace" font-size="11">⚡</text>
  <text x="232" y="43" fill="#c9d1d9" font-family="monospace" font-size="10">Instant</text>
  <text x="200" y="18" fill="#4b5563" font-family="monospace" font-size="9">tool</text>

  <!-- Branch: Web -->
  <line x1="178" y1="135" x2="195" y2="85" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="200" y="70" width="120" height="28" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="218" y="88" fill="#e8375a" font-family="monospace" font-size="11">🌐</text>
  <text x="232" y="88" fill="#c9d1d9" font-family="monospace" font-size="10">Search+LLM</text>
  <text x="200" y="63" fill="#4b5563" font-family="monospace" font-size="9">web</text>

  <!-- Branch: LLM (center) -->
  <line x1="178" y1="135" x2="200" y2="135" stroke="#e8375a" stroke-width="1.5"/>
  <polygon points="197,131 204,135 197,139" fill="#e8375a"/>
  <rect x="204" y="120" width="110" height="28" rx="6" fill="#161b22" stroke="#e8375a" stroke-width="1.5"/>
  <text x="222" y="138" fill="#e8375a" font-family="monospace" font-size="11">🧠</text>
  <text x="236" y="138" fill="#c9d1d9" font-family="monospace" font-size="10">Waterfall</text>
  <text x="204" y="113" fill="#e8375a" font-family="monospace" font-size="9" font-weight="600">llm</text>

  <!-- Confidence Gate -->
  <line x1="314" y1="135" x2="340" y2="135" stroke="#e8375a" stroke-width="1"/>
  <polygon points="337,131 344,135 337,139" fill="#e8375a"/>
  <polygon points="372,115 400,135 372,155 344,135" fill="#161b22" stroke="#e8375a" stroke-width="1"/>
  <text x="372" y="133" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="7">CONF</text>
  <text x="372" y="143" text-anchor="middle" fill="#6b7280" font-family="monospace" font-size="7">GATE</text>

  <!-- Pass -->
  <line x1="400" y1="135" x2="425" y2="105" stroke="#22c55e" stroke-width="1"/>
  <text x="412" y="98" fill="#22c55e" font-family="monospace" font-size="9" font-weight="600">✅ Out</text>

  <!-- Fail / Retry -->
  <line x1="400" y1="135" x2="425" y2="165" stroke="#ef4444" stroke-width="1"/>
  <text x="408" y="178" fill="#ef4444" font-family="monospace" font-size="9" font-weight="600">🔄 Retry</text>
  <!-- Retry arrow back -->
  <path d="M 425,182 L 425,200 L 259,200 L 259,155" stroke="#ef4444" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <polygon points="255,155 259,148 263,155" fill="#ef4444"/>

  <!-- Branch: Cmd (bottom) -->
  <line x1="178" y1="135" x2="195" y2="230" stroke="#4b5563" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="200" y="215" width="110" height="28" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1"/>
  <text x="218" y="233" fill="#e8375a" font-family="monospace" font-size="11">🔊</text>
  <text x="232" y="233" fill="#c9d1d9" font-family="monospace" font-size="10">Execute</text>
  <text x="200" y="208" fill="#4b5563" font-family="monospace" font-size="9">cmd</text>
</svg>
